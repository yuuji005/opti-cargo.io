<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OptiCargo - Analytics Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            /* Palet Warna Modern Dark Analytics (Sesuai Referensi) */
            --bg-main: #0B1120;        /* Deep Navy/Black Background */
            --bg-card: #1E293B;        /* Slate 800 - Card Background */
            --bg-input: #0F172A;       /* Slate 900 - Input Background */
            --border-color: #334155;   /* Slate 700 - Subtle Borders */
            
            --text-main: #F8FAFC;      /* Slate 50 - Bright Text */
            --text-muted: #94A3B8;     /* Slate 400 - Secondary Text */
            
            --accent-blue: #3B82F6;    /* Primary Blue */
            --accent-cyan: #0EA5E9;    /* Cyan glow */
            --accent-green: #10B981;   /* Emerald Green */
            --accent-purple: #8B5CF6;  /* Violet */
            --accent-red: #EF4444;     /* Red/Rose */
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-main); }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-main);
            color: var(--text-main); 
            margin: 0; 
            padding: 30px 20px; 
            min-height: 100vh;
        }

        .dashboard { max-width: 1300px; margin: auto; }

        /* Header */
        header { 
            margin-bottom: 30px; 
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        header h1 { 
            font-size: 2rem; 
            font-weight: 700;
            color: var(--text-main); 
            margin: 0; 
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        header h1::before {
            content: '';
            display: inline-block;
            width: 12px;
            height: 12px;
            background: var(--accent-cyan);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent-cyan);
        }
        header p { color: var(--text-muted); margin: 0; font-size: 0.95rem; font-weight: 500; }

        .grid-container { display: grid; grid-template-columns: 320px 1fr; gap: 20px; }
        @media (max-width: 960px) { .grid-container { grid-template-columns: 1fr; } }

        /* Cards */
        .card { 
            background: var(--bg-card); 
            padding: 20px; 
            border: 1px solid var(--border-color);
            border-radius: 12px; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        .card h2 { 
            font-size: 1.05rem; 
            color: var(--text-main); 
            margin-top: 0; 
            margin-bottom: 15px;
            font-weight: 600; 
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Form Inputs */
        .form-group { margin-bottom: 15px; }
        .form-group label { 
            display: block; font-size: 0.75rem; font-weight: 600; 
            margin-bottom: 6px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px;
        }
        .form-group input { 
            width: 100%; padding: 10px 12px; 
            border: 1px solid var(--border-color); 
            background-color: var(--bg-input); 
            color: var(--text-main);
            border-radius: 8px; font-family: 'Inter', sans-serif; font-size: 0.9rem;
            box-sizing: border-box; transition: all 0.3s ease;
        }
        .form-group input:focus { 
            outline: none; border-color: var(--accent-blue); 
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }
        .grid-2-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        
        /* Table */
        .table-container {
            max-height: 250px; overflow-y: auto; 
            border: 1px solid var(--border-color);
            border-radius: 8px; margin-bottom: 15px; background: var(--bg-input);
        }
        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border-color); }
        th { 
            background-color: var(--bg-card); color: var(--text-muted); font-weight: 600; 
            position: sticky; top: 0; z-index: 10; text-transform: uppercase; letter-spacing: 0.5px;
        }
        tbody tr { transition: background-color 0.2s; }
        tbody tr:hover { background-color: rgba(59, 130, 246, 0.1); }
        
        /* Tombol dengan Animasi */
        .btn-run { 
            background: linear-gradient(to right, var(--accent-blue), var(--accent-cyan));
            color: white; border: none; width: 100%; padding: 14px; 
            font-size: 0.95rem; font-weight: 600; border-radius: 8px; 
            cursor: pointer; transition: all 0.2s ease; margin-top: 10px;
            box-shadow: 0 4px 12px rgba(14, 165, 233, 0.3);
        }
        .btn-run:hover { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(14, 165, 233, 0.4); filter: brightness(1.1); }
        .btn-run:active { transform: translateY(1px) scale(0.98); } /* Efek ditekan (animasi) */
        .btn-run:disabled { background: var(--border-color); box-shadow: none; cursor: not-allowed; transform: none; color: var(--text-muted); }
        
        /* Result Boxes */
        .results-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 20px; }
        @media (max-width: 1100px) { .results-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 600px) { .results-grid { grid-template-columns: 1fr 1fr; } }

        .result-box { 
            background: var(--bg-input); border: 1px solid var(--border-color); 
            border-radius: 10px; padding: 15px 10px; text-align: center; 
            transition: transform 0.3s ease, border-color 0.3s ease;
            position: relative; overflow: hidden;
        }
        .result-box:hover { transform: translateY(-3px); border-color: var(--accent-blue); }
        
        /* Garis atas aksen bercahaya */
        .result-box::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
        }
        .res-shc::before { background: var(--text-muted); }
        .res-sthc::before { background: var(--accent-blue); }
        .res-schc::before { background: var(--accent-purple); }
        .res-sa::before { background: #F59E0B; } /* Amber */
        .res-ga::before { background: var(--accent-green); }

        .result-box h3 { font-size: 0.7rem; color: var(--text-muted); margin: 0 0 8px 0; text-transform: uppercase; letter-spacing: 0.5px; }
        .profit-value { font-size: 1.5rem; font-weight: 700; color: var(--text-main); line-height: 1.2; }
        .weight-value { font-size: 0.7rem; color: var(--text-muted); display: block; margin-top: 5px; }
        
        /* Area Grafik */
        .chart-row { display: grid; grid-template-columns: 2fr 1fr; gap: 15px; }
        @media (max-width: 960px) { .chart-row { grid-template-columns: 1fr; } }
        .chart-container { 
            position: relative; height: 360px; width: 100%; 
            background: var(--bg-input); border-radius: 10px; padding: 15px;
            box-sizing: border-box; border: 1px solid var(--border-color);
        }
    </style>
</head>
<body>

<div class="dashboard">
    <header>
        <h1>OptiCargo Analytics</h1>
        <p>Real-time Simulation & Optimization Dashboard</p>
    </header>

    <div class="grid-container">
        <div class="card">
            <h2>⚙️ System Parameters</h2>
            <div class="grid-2-col">
                <div class="form-group">
                    <label>Max Capacity (kg)</label>
                    <input type="number" id="inp-kapasitas" value="50">
                </div>
                <div class="form-group">
                    <label>Epochs / Gen</label>
                    <input type="number" id="inp-iter" value="50">
                </div>
                <div class="form-group">
                    <label>SA Initial Temp (°C)</label>
                    <input type="text" id="inp-sa-t" value="100">
                </div>
                <div class="form-group">
                    <label>SA Cooling Rate</label>
                    <input type="text" id="inp-sa-cool" value="0.85">
                </div>
                <div class="form-group">
                    <label>GA Population</label>
                    <input type="number" id="inp-ga-pop" value="10">
                </div>
                <div class="form-group">
                    <label>GA Mut. Rate</label>
                    <input type="text" id="inp-ga-mut" value="0.1">
                </div>
            </div>

            <h2 style="margin-top: 20px;">📦 Inventory Data</h2>
            <div class="table-container">
                <table>
                    <thead><tr><th>Item Name</th><th>Weight</th><th>Profit</th></tr></thead>
                    <tbody id="tabel-barang"></tbody>
                </table>
            </div>

            <button class="btn-run" onclick="jalankanSimulasi()">Initialize Simulation</button>
        </div>

        <div class="card">
            <h2>📊 Performance Metrics</h2>
            
            <div class="results-grid">
                <div class="result-box res-shc">
                    <h3>Simple HC</h3>
                    <div class="profit-value" id="res-shc-profit">0</div>
                    <span class="weight-value" id="res-shc-weight">0 / 50 kg</span>
                </div>
                <div class="result-box res-sthc">
                    <h3>Steepest HC</h3>
                    <div class="profit-value" id="res-sthc-profit">0</div>
                    <span class="weight-value" id="res-sthc-weight">0 / 50 kg</span>
                </div>
                <div class="result-box res-schc">
                    <h3>Stochastic HC</h3>
                    <div class="profit-value" id="res-schc-profit">0</div>
                    <span class="weight-value" id="res-schc-weight">0 / 50 kg</span>
                </div>
                <div class="result-box res-sa">
                    <h3>Sim. Annealing</h3>
                    <div class="profit-value" id="res-sa-profit">0</div>
                    <span class="weight-value" id="res-sa-weight">0 / 50 kg</span>
                </div>
                <div class="result-box res-ga">
                    <h3>Genetic Algo</h3>
                    <div class="profit-value" id="res-ga-profit">0</div>
                    <span class="weight-value" id="res-ga-weight">0 / 50 kg</span>
                </div>
            </div>

            <div class="chart-row">
                <div class="chart-container">
                    <canvas id="grafikKonvergensi"></canvas>
                </div>
                <div class="chart-container">
                    <canvas id="grafikSuhu"></canvas>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const BARANG = [
        {nama: "Genset Mini", berat: 15, nilai: 500}, {nama: "Beras 1 Karung", berat: 25, nilai: 350},
        {nama: "Suku Cadang", berat: 10, nilai: 250}, {nama: "Kotak P3K", berat: 2, nilai: 150},
        {nama: "Tenda Pleton", berat: 20, nilai: 400}, {nama: "Air Mineral", berat: 10, nilai: 100},
        {nama: "Radio Komunikasi", berat: 3, nilai: 300}, {nama: "Makanan Kaleng", berat: 8, nilai: 200},
        {nama: "Alat Navigasi", berat: 5, nilai: 350}, {nama: "Baterai Cadangan", berat: 7, nilai: 180}
    ];
    const JUMLAH_BARANG = BARANG.length;
    let chartKonvergensi = null;
    let chartSuhu = null;

    // Set Default Font untuk Chart.js agar sesuai tema
    Chart.defaults.color = '#94A3B8';
    Chart.defaults.font.family = 'Inter';

    window.onload = () => {
        const tbody = document.getElementById('tabel-barang');
        BARANG.forEach(b => {
            tbody.innerHTML += `<tr>
                <td style="color:#F8FAFC; font-weight:500;">${b.nama}</td>
                <td>${b.berat} kg</td>
                <td style="color:#10B981;">Rp ${b.nilai}K</td>
            </tr>`;
        });
        renderGrafikKosong();
    };

    function ambilParameter() {
        const parseIndoFloat = (id) => parseFloat(document.getElementById(id).value.replace(',', '.')) || 0;
        const parseIntSafe = (id) => parseInt(document.getElementById(id).value) || 0;
        return {
            kapasitas: parseIntSafe('inp-kapasitas') || 50,
            maxIter: parseIntSafe('inp-iter') || 50,
            saT: parseIndoFloat('inp-sa-t') || 100,
            saCool: parseIndoFloat('inp-sa-cool') || 0.85,
            gaPop: parseIntSafe('inp-ga-pop') || 10,
            gaMut: parseIndoFloat('inp-ga-mut') || 0.1
        };
    }

    function evaluasiSolusi(solusi, kapasitasMaks) {
        let berat = 0, profit = 0;
        for (let i = 0; i < JUMLAH_BARANG; i++) {
            if (solusi[i] === 1) { berat += BARANG[i].berat; profit += BARANG[i].nilai; }
        }
        return { profit: berat > kapasitasMaks ? 0 : profit, berat: berat };
    }

    function generateSolusiAwal() { return Array.from({length: JUMLAH_BARANG}, () => Math.random() < 0.5 ? 1 : 0); }
    function getNeighbors(solusi) {
        let neighbors = [];
        for (let i = 0; i < JUMLAH_BARANG; i++) { let n = [...solusi]; n[i] = 1 - n[i]; neighbors.push(n); }
        return neighbors;
    }

    // LOGIKA ALGORITMA
    function simpleHC(params) {
        let curr = generateSolusiAwal(), evalCurr = evaluasiSolusi(curr, params.kapasitas);
        let hist = [evalCurr.profit];
        for (let i = 0; i < params.maxIter; i++) {
            let neighbors = getNeighbors(curr);
            for (let n of neighbors) {
                let evalN = evaluasiSolusi(n, params.kapasitas);
                if (evalN.profit > evalCurr.profit) { curr = n; evalCurr = evalN; break; }
            }
            hist.push(evalCurr.profit);
        }
        return { ...evalCurr, history: hist };
    }

    function steepestHC(params) {
        let curr = generateSolusiAwal(), evalCurr = evaluasiSolusi(curr, params.kapasitas);
        let hist = [evalCurr.profit];
        for (let i = 0; i < params.maxIter; i++) {
            let bestN = curr, bestEval = evalCurr;
            for (let n of getNeighbors(curr)) {
                let evalN = evaluasiSolusi(n, params.kapasitas);
                if (evalN.profit > bestEval.profit) { bestN = n; bestEval = evalN; }
            }
            if (bestEval.profit > evalCurr.profit) { curr = bestN; evalCurr = bestEval; }
            hist.push(evalCurr.profit);
        }
        return { ...evalCurr, history: hist };
    }

    function stochasticHC(params) {
        let curr = generateSolusiAwal(), evalCurr = evaluasiSolusi(curr, params.kapasitas);
        let hist = [evalCurr.profit];
        for (let i = 0; i < params.maxIter; i++) {
            let betterNeighbors = [];
            for (let n of getNeighbors(curr)) {
                let evalN = evaluasiSolusi(n, params.kapasitas);
                if (evalN.profit > evalCurr.profit) betterNeighbors.push({sol: n, ev: evalN});
            }
            if (betterNeighbors.length > 0) {
                let randomPick = betterNeighbors[Math.floor(Math.random() * betterNeighbors.length)];
                curr = randomPick.sol; evalCurr = randomPick.ev;
            }
            hist.push(evalCurr.profit);
        }
        return { ...evalCurr, history: hist };
    }

    function simulatedAnnealing(params) {
        let curr = generateSolusiAwal(), evalCurr = evaluasiSolusi(curr, params.kapasitas);
        let hist = [evalCurr.profit], tempHist = [params.saT], T = params.saT;
        for (let i = 0; i < params.maxIter; i++) {
            let neighbors = getNeighbors(curr);
            let n = neighbors[Math.floor(Math.random() * neighbors.length)];
            let evalN = evaluasiSolusi(n, params.kapasitas);
            let delta = evalN.profit - evalCurr.profit;
            if (delta > 0 || (T > 0 && Math.random() < Math.exp(delta / T))) { curr = n; evalCurr = evalN; }
            hist.push(evalCurr.profit);
            T *= params.saCool;
            tempHist.push(T);
        }
        return { ...evalCurr, history: hist, tempHistory: tempHist };
    }

    function geneticAlgorithm(params) {
        let populasi = Array.from({length: params.gaPop}, generateSolusiAwal);
        let hist = [], bestGlobal = { profit: 0, berat: 0 };
        for (let gen = 0; gen <= params.maxIter; gen++) {
            let evals = populasi.map(ind => evaluasiSolusi(ind, params.kapasitas));
            let bestGenIdx = evals.reduce((best, curr, idx, arr) => curr.profit > arr[best].profit ? idx : best, 0);
            if (evals[bestGenIdx].profit > bestGlobal.profit) bestGlobal = evals[bestGenIdx];
            hist.push(bestGlobal.profit);
            let popBaru = [populasi[bestGenIdx]]; 
            while(popBaru.length < params.gaPop) {
                let p1 = populasi[Math.floor(Math.random() * params.gaPop)], p2 = populasi[Math.floor(Math.random() * params.gaPop)];
                let titik = Math.floor(Math.random() * (JUMLAH_BARANG - 1)) + 1;
                let c = p1.slice(0, titik).concat(p2.slice(titik));
                for(let i=0; i<JUMLAH_BARANG; i++) { if(Math.random() < params.gaMut) c[i] = 1 - c[i]; }
                popBaru.push(c);
            }
            populasi = popBaru.slice(0, params.gaPop); 
        }
        return { ...bestGlobal, history: hist };
    }

    // FUNGSI UTAMA & RENDER
    function jalankanSimulasi() {
        const btn = document.querySelector('.btn-run');
        btn.innerText = "Processing Data..."; btn.disabled = true;
        
        // Delay animasi loading
        setTimeout(() => {
            const params = ambilParameter();
            let resSHC = simpleHC(params), resStHC = steepestHC(params), resScHC = stochasticHC(params);
            let resSA = simulatedAnnealing(params), resGA = geneticAlgorithm(params);

            updateUI('shc', resSHC, params.kapasitas); updateUI('sthc', resStHC, params.kapasitas);
            updateUI('schc', resScHC, params.kapasitas); updateUI('sa', resSA, params.kapasitas); updateUI('ga', resGA, params.kapasitas);

            renderGrafikKonvergensi(resSHC.history, resStHC.history, resScHC.history, resSA.history, resGA.history, params.maxIter);
            renderGrafikSuhu(resSA.tempHistory, params.maxIter);
            
            btn.innerText = "Run Simulation Again"; btn.disabled = false;
        }, 400);
    }

    function updateUI(id, data, maxCap) {
        // Animasi angka (sederhana)
        const target = document.getElementById(`res-${id}-profit`);
        target.style.opacity = 0;
        setTimeout(() => {
            target.innerText = data.profit;
            target.style.opacity = 1;
            document.getElementById(`res-${id}-weight`).innerText = `${data.berat} / ${maxCap} kg`;
        }, 150);
    }

    function renderGrafikKosong() {
        const configDefault = { type: 'line', data: { labels: [], datasets: [] }, options: { responsive: true, maintainAspectRatio: false } };
        chartKonvergensi = new Chart(document.getElementById('grafikKonvergensi').getContext('2d'), configDefault);
        chartSuhu = new Chart(document.getElementById('grafikSuhu').getContext('2d'), configDefault);
    }

    function renderGrafikKonvergensi(h1, h2, h3, h4, h5, maxIter) {
        let labels = Array.from({length: maxIter + 1}, (_, i) => i);
        chartKonvergensi.destroy(); 
        
        // Warna Chart.js Sesuai Tema
        const cSHC = '#94A3B8'; // Muted
        const cStHC = '#3B82F6'; // Blue
        const cScHC = '#8B5CF6'; // Purple
        const cSA = '#F59E0B'; // Amber
        const cGA = '#10B981'; // Green

        chartKonvergensi = new Chart(document.getElementById('grafikKonvergensi').getContext('2d'), {
            type: 'line',
            data: {
                labels: labels,
                datasets: [
                    { label: 'Simple HC', data: h1, borderColor: cSHC, borderWidth: 2, tension: 0.3, pointRadius: 0 },
                    { label: 'Steepest HC', data: h2, borderColor: cStHC, borderWidth: 2, tension: 0.3, pointRadius: 0 },
                    { label: 'Stochastic HC', data: h3, borderColor: cScHC, borderWidth: 2, tension: 0.3, pointRadius: 0 },
                    // Efek Glow / Fill untuk SA & GA (yang biasanya menang)
                    { label: 'Sim. Annealing', data: h4, borderColor: cSA, backgroundColor: 'rgba(245, 158, 11, 0.1)', borderWidth: 3, tension: 0.3, pointRadius: 0, fill: true },
                    { label: 'Genetic Algo', data: h5, borderColor: cGA, backgroundColor: 'rgba(16, 185, 129, 0.1)', borderWidth: 3, tension: 0.3, pointRadius: 0, fill: true }
                ]
            },
            options: { 
                responsive: true, maintainAspectRatio: false,
                animation: { duration: 800, easing: 'easeOutQuart' }, // Animasi render halus
                interaction: { mode: 'index', intersect: false },
                plugins: { 
                    legend: { position: 'bottom', labels: { boxWidth: 10, usePointStyle: true, padding: 20 } }, 
                    title: { display: true, text: 'Convergence Analysis', color: '#F8FAFC', font: { size: 14, weight: '600' }, padding: { bottom: 15 } },
                    tooltip: { backgroundColor: 'rgba(15, 23, 42, 0.9)', titleColor: '#F8FAFC', bodyColor: '#94A3B8', borderColor: '#334155', borderWidth: 1 }
                },
                scales: {
                    y: { beginAtZero: true, grid: { color: 'rgba(255, 255, 255, 0.05)' }, title: { display: true, text: 'Total Profit' } },
                    x: { grid: { display: false }, title: { display: true, text: 'Epochs / Generations' } }
                }
            }
        });
    }

    function renderGrafikSuhu(tempHist, maxIter) {
        let labels = Array.from({length: maxIter + 1}, (_, i) => i);
        chartSuhu.destroy(); 
        chartSuhu = new Chart(document.getElementById('grafikSuhu').getContext('2d'), {
            type: 'line',
            data: { labels: labels, datasets: [{ label: 'Temp (°C)', data: tempHist, borderColor: '#EF4444', backgroundColor: 'rgba(239, 68, 68, 0.15)', fill: true, borderWidth: 2, tension: 0.4, pointRadius: 0 }] },
            options: { 
                responsive: true, maintainAspectRatio: false,
                animation: { duration: 800 },
                plugins: { 
                    legend: { display: false }, 
                    title: { display: true, text: 'SA Cooling Curve', color: '#F8FAFC', font: { size: 13, weight: '600' } },
                    tooltip: { backgroundColor: 'rgba(15, 23, 42, 0.9)', borderColor: '#334155', borderWidth: 1 }
                },
                scales: { 
                    y: { beginAtZero: true, grid: { color: 'rgba(255, 255, 255, 0.05)' } }, 
                    x: { grid: { display: false }, ticks: { display: false } } 
                }
            }
        });
    }
</script>

</body>
</html>
